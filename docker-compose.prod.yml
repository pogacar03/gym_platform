services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitmate}
      POSTGRES_USER: ${POSTGRES_USER:-fitmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitmate} -d ${POSTGRES_DB:-fitmate}"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms768m -Xmx768m}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fitmate:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      PORT: ${PORT:-8080}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/fitmate}
      DB_USERNAME: ${DB_USERNAME:-fitmate}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      ELASTICSEARCH_URIS: ${ELASTICSEARCH_URIS:-http://elasticsearch:9200}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      SEARCH_VECTOR_ENABLED: ${SEARCH_VECTOR_ENABLED:-true}
      SEARCH_REBUILD_ON_STARTUP: ${SEARCH_REBUILD_ON_STARTUP:-false}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:
  elasticsearch_data:
