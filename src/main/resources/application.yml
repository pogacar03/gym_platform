spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fitmate}
    username: ${DB_USERNAME:fitmate}
    password: ${DB_PASSWORD:fitmate}
    driver-class-name: org.postgresql.Driver
  thymeleaf:
    cache: false
  flyway:
    enabled: true
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
server:
  servlet:
    session:
      timeout: 12h

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/*.xml

app:
  security:
    admin-password: ${ADMIN_PASSWORD:}
  llm:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o-mini}
  search:
    enabled: ${SEARCH_ENABLED:true}
    index-name: ${SEARCH_INDEX_NAME:workout_video_search}
    candidate-limit: ${SEARCH_CANDIDATE_LIMIT:8}
    vector-enabled: ${SEARCH_VECTOR_ENABLED:true}
    embedding-dimensions: ${SEARCH_EMBEDDING_DIMENSIONS:96}
    vector-candidates: ${SEARCH_VECTOR_CANDIDATES:24}
    lexical-weight: ${SEARCH_LEXICAL_WEIGHT:0.55}
    vector-weight: ${SEARCH_VECTOR_WEIGHT:0.45}
    rebuild-on-startup: ${SEARCH_REBUILD_ON_STARTUP:false}
    knowledge-index-name: ${SEARCH_KNOWLEDGE_INDEX_NAME:knowledge_chunk_search}
    knowledge-candidate-limit: ${SEARCH_KNOWLEDGE_CANDIDATE_LIMIT:5}

logging:
  level:
    com.graduation.fitmate: INFO
