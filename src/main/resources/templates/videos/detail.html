<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${video.title})}"></head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container pb-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <span class="eyebrow" th:text="${video.sourceType}"></span>
                    <h2 th:text="${video.title}"></h2>
                    <p class="text-muted" th:text="${video.description}"></p>
                    <div class="ratio ratio-16x9 rounded overflow-hidden bg-dark" th:if="${video.embedUrl != null and !#strings.isEmpty(video.embedUrl)}">
                        <iframe th:src="${video.embedUrl}" th:title="${video.title}" allowfullscreen></iframe>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <a class="btn btn-dark" th:href="${video.videoUrl}" target="_blank">Open on YouTube</a>
                        <a class="btn btn-outline-dark" th:href="@{/videos}">Back to library</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5>Video details</h5>
                    <p class="mb-2"><strong>Channel:</strong> <span th:text="${video.platformChannel}"></span></p>
                    <p class="mb-2"><strong>Goal:</strong> <span th:text="${video.targetGoal}"></span></p>
                    <p class="mb-2"><strong>Target area:</strong> <span th:text="${video.targetBodyPart}"></span></p>
                    <p class="mb-2"><strong>Posture:</strong> <span th:text="${video.postureType}"></span></p>
                    <p class="mb-2"><strong>Equipment:</strong> <span th:text="${video.equipmentRequirement}"></span></p>
                    <p class="mb-2"><strong>Duration:</strong> <span th:text="${video.durationMinutes + ' min'}"></span></p>
                    <p class="mb-0"><strong>Safety notes:</strong> <span th:text="${video.safetyNotes}"></span></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
