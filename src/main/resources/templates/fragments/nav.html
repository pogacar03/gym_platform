<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="nav" class="site-nav">
    <div class="container">
        <a class="site-brand" th:href="@{/}">
            <span class="brand-mark">F</span>
            <span class="brand-copy">
                <strong>FitMate</strong>
                <span>Smart workout companion</span>
            </span>
        </a>
        <div class="site-nav-actions">
            <div class="site-nav-links">
                <a class="nav-link" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
                <a class="nav-link" th:href="@{/profile}" th:text="#{nav.profile}">Profile</a>
                <a class="nav-link" th:href="@{/videos}" th:text="#{nav.library}">Library</a>
                <a class="nav-link" th:href="@{/recommendations}" th:text="#{nav.recommend}">Recommend</a>
                <a class="nav-link" th:href="@{/admin/videos}" th:text="#{nav.admin}">Admin</a>
                <a class="nav-link" th:href="@{/admin/imports}" th:text="#{nav.imports}">Imports</a>
                <a class="nav-link" th:href="@{/logout}" th:text="#{nav.logout}">Logout</a>
            </div>
            <div th:replace="~{fragments/lang-switch :: switcher}"></div>
        </div>
    </div>
</nav>
<div th:replace="~{fragments/lang-switch :: script}"></div>
</body>
</html>
