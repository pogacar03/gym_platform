<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Workout Library')}"></head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Workout library</h2>
            <p class="text-muted mb-0">Curated multi-source videos for the recommendation engine. The current seed data is YouTube-first for HKU-friendly demos.</p>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="video : ${videos}">
            <div class="card h-100 border-0 shadow-sm">
                <img class="card-img-top" th:src="${video.thumbnailUrl}" th:alt="${video.title}">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="badge text-bg-dark" th:text="${video.targetGoal}"></span>
                        <span class="badge text-bg-secondary" th:text="${video.durationMinutes + ' min'}"></span>
                    </div>
                    <h5 class="card-title" th:text="${video.title}"></h5>
                    <p class="card-text text-muted" th:text="${video.description}"></p>
                    <p class="small mb-1"><strong>Source:</strong> <span th:text="${video.sourceType}"></span> / <span th:text="${video.platformChannel}"></span></p>
                    <p class="small mb-1"><strong>Posture:</strong> <span th:text="${video.postureType}"></span></p>
                    <p class="small mb-1"><strong>Target area:</strong> <span th:text="${video.targetBodyPart}"></span></p>
                    <p class="small mb-1"><strong>Equipment:</strong> <span th:text="${video.equipmentRequirement}"></span></p>
                    <p class="small mb-3"><strong>Impact:</strong> <span th:text="${video.impactLevel}"></span></p>
                    <div class="d-flex gap-2">
                        <a class="btn btn-dark btn-sm" th:href="@{/videos/{id}(id=${video.id})}">Preview</a>
                        <a class="btn btn-outline-dark btn-sm" th:href="${video.videoUrl}" target="_blank">Open source</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
