<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="bg-light">
<div class="login-shell">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-end mb-3">
                        <div th:replace="~{fragments/lang-switch :: switcher}"></div>
                    </div>
                    <h2 class="mb-3 auth-heading" th:text="#{login.title}">Login</h2>
                    <p class="text-muted" th:text="#{login.subtitle}">Use the seeded accounts or register a new one.</p>
                    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
                    <div class="alert alert-danger" th:if="${param.error}" th:text="#{login.error}">Invalid username or password.</div>
                    <div class="alert alert-success" th:if="${param.logout}" th:text="#{login.logout}">You have been logged out.</div>
                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.username}">Username</label>
                            <input class="form-control" type="text" name="username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.password}">Password</label>
                            <input class="form-control" type="password" name="password">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me" checked>
                            <label class="form-check-label" for="remember-me" th:text="#{login.remember}">Keep me signed in for 7 days</label>
                        </div>
                        <button class="btn btn-dark w-100" type="submit" th:text="#{login.submit}">Login</button>
                    </form>
                    <a class="btn btn-link px-0 mt-3" th:href="@{/register}" th:text="#{login.register}">Need an account? Register here.</a>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
<div th:replace="~{fragments/lang-switch :: script}"></div>
</body>
</html>
